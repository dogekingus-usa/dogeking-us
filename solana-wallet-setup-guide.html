  <h1>🦊 Solana Wallet Setup Guide</h1>

  <div class="subtitle">Step-by-Step Phantom Wallet Installation &mdash; Fully Illustrated</div>



  <p style="margin-bottom:1.5rem;color:#b5afe0;">Before you can buy your first Solana meme coin or stake $DKING tokens, you need a Solana wallet. This guide walks you through setting up <strong>Phantom</strong> &mdash; the most popular and user-friendly Solana wallet with 3M+ active users. No prior crypto experience required.</p>



  <div class="step">

    <h2><span class="num">1</span> Download Phantom Wallet</h2>

    <p><strong>Phantom</strong> is available as a browser extension (Chrome, Brave, Firefox, Edge) and as a mobile app (iOS &amp; Android).</p>

    <ul>

      <li><strong>Desktop:</strong> Go to <code>https://phantom.app</code> and click "Download for [your browser]"</li>

      <li><strong>Mobile:</strong> Search "Phantom" in the App Store or Google Play Store</li>

      <li><strong>Important:</strong> Only download from the official Phantom website or official app stores. There are many fake phishing wallets out there.</li>

    </ul>

    <div class="screenshot-box">Phantom.app homepage with Download button highlighted</div>

  </div>



  <div class="step">

    <h2><span class="num">2</span> Create a New Wallet</h2>

    <p>After installing the extension, click the Phantom icon in your browser toolbar and select <strong>"Create a New Wallet"</strong>.</p>

    <ul>

      <li>You&rsquo;ll be asked to create a <strong>password</strong> (at least 8 characters, use a strong unique password)</li>

      <li>Phantom will generate your <strong>Secret Recovery Phrase</strong> (12 words) &mdash; this is the most critical step</li>

    </ul>

    <div class="screenshot-box">Phantom onboarding screen showing "Create New Wallet" button</div>

    <div class="danger">

      <strong>⚠️ CRITICAL:</strong> Your 12-word recovery phrase is the <em>only</em> way to restore your wallet. Never share it, never type it into any website, never take a screenshot of it, and never store it digitally. Write it down on paper and keep it in a safe place. Anyone with your phrase controls your funds forever.

    </div>

  </div>



  <div class="step">

    <h2><span class="num">3</span> Secure Your Recovery Phrase</h2>

    <p>Phantom will display your 12-word recovery phrase one word at a time. Follow these security best practices:</p>

    <ul>

      <li><strong>Write it down on paper</strong> &mdash; two copies stored in separate locations</li>

      <li>Use a <strong>metal seed plate</strong> for fire/water protection (optional but recommended for large holdings)</li>

      <li><strong>Never</strong> store it in a digital file, cloud service, email, or note app</li>

      <li><strong>Never</strong> enter it into any website or app other than Phantom itself (for wallet recovery)</li>

    </ul>

    <div class="screenshot-box">Phantom recovery phrase display with 12 blank word slots being filled</div>

  </div>



  <div class="step">

    <h2><span class="num">4</span> Verify Your Phrase</h2>

    <p>Phantom will ask you to confirm your recovery phrase by selecting the words in the correct order. This ensures you&rsquo;ve written them down properly. Complete this step before proceeding.</p>

    <div class="screenshot-box">Phantom phrase verification screen with word tiles to arrange</div>

  </div>



  <div class="step">

    <h2><span class="num">5</span> Set Up Your Wallet Profile</h2>

    <p>Once your phrase is verified, you can optionally:</p>

    <ul>

      <li><strong>Set a nickname</strong> for your wallet (useful if you manage multiple wallets)</li>

      <li><strong>Choose a display theme</strong> (Dark/Light mode)</li>

      <li><strong>Pin the Phantom extension</strong> to your browser toolbar for quick access</li>

    </ul>

    <p>Your default Solana address will be automatically generated. It looks like: <code>7aB3...XyZ9</code></p>

    <div class="screenshot-box">Phantom wallet dashboard showing balance, tokens, and activity</div>

  </div>



  <div class="step">

    <h2><span class="num">6</span> Add SOL to Your Wallet</h2>

    <p>To start trading, you need SOL (Solana&rsquo;s native token) for transaction fees. Every Solana transaction costs a fraction of a cent in SOL.</p>

    <ul>

      <li><strong>Option A:</strong> Buy SOL directly inside Phantom using MoonPay or Simplex (credit/debit card, Apple Pay, Google Pay)</li>

      <li><strong>Option B:</strong> Transfer SOL from a centralized exchange like Coinbase, Binance, or Kraken</li>

    </ul>

    <p>To receive SOL from an exchange: copy your Phantom wallet address (click on your wallet name → "Copy Address") and paste it as the withdrawal address on the exchange.</p>

    <div class="screenshot-box">Phantom wallet showing "Buy SOL" button and deposit/withdraw options</div>

    <div class="warning">

      <strong>🛡️ Always send a small test transaction</strong> ($1&ndash;$5 worth of SOL) first to confirm the address is correct before sending larger amounts.

    </div>

  </div>



  <div class="step">

    <h2><span class="num">7</span> Connect to dApps (Decentralized Apps)</h2>

    <p>Now you can connect your Phantom wallet to Solana dApps like Jupiter (best swap aggregator), Raydium (DEX), or <strong>dogeking.us</strong> for staking and token purchases.</p>

    <ul>

      <li>Visit any Solana dApp and click <strong>"Connect Wallet"</strong></li>

      <li>Select <strong>Phantom</strong> from the wallet list</li>

      <li>Approve the connection request in the Phantom pop-up</li>

      <li>You&rsquo;re now connected! Always verify the website URL before approving any transaction</li>

    </ul>

    <div class="screenshot-box">Jupiter DEX website showing "Connect Wallet" modal with Phantom option</div>

  </div>



  <div class="step">

    <h2><span class="num">8</span> Buy Your First Meme Coin</h2>

    <p>Ready to buy $DKING or another Solana meme coin? Here&rsquo;s the quickest method using <strong>Jupiter Exchange</strong>:</p>

    <ul>

      <li>Go to <code>jup.ag</code> and connect your Phantom wallet</li>

      <li>Select SOL as the source token and the meme coin as the target token</li>

      <li>Enter the amount of SOL to swap</li>

      <li>Review the price impact and slippage (2&ndash;5% recommended for meme coins)</li>

      <li>Click "Swap" and approve the transaction in Phantom</li>

      <li>The tokens will appear in your Phantom wallet automatically</li>

    </ul>

    <div class="screenshot-box">Jupiter swap interface with SOL to $DKING transaction confirmed</div>

  </div>



  <div class="step">

    <h2><span class="num">9</span> Security Checklist</h2>

    <ul>

      <li>✅ <strong>Never share your recovery phrase</strong> &mdash; Phantom support will NEVER ask for it</li>

      <li>✅ <strong>Always verify URLs</strong> &mdash; bookmark the official websites of all dApps you use</li>

      <li>✅ <strong>Revoke unnecessary token approvals</strong> using solscan.io/token-checker</li>

      <li>✅ <strong>Use a hardware wallet</strong> (Ledger Nano X/S) for holdings over $1,000</li>

      <li>✅ <strong>Enable auto-lock</strong> on Phantom (Settings → Auto-Lock Timer set to 1 minute)</li>

      <li>✅ <strong>Beware of airdrop scams</strong> &mdash; never "claim" tokens from unknown sites</li>

    </ul>

    <div class="screenshot-box">Phantom security settings with auto-lock and hardware wallet options</div>

  </div>
