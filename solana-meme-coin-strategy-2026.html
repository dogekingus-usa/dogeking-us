<h2>Portfolio Allocation Strategy</h2>
<p><strong>40% Blue Chips:</strong> $BONK, $WIF, $POPCAT — established projects with liquidity and community.<br>
<strong>30% Mid-Cap Gems:</strong> Projects with $10-100M market cap, active development, growing community.<br>
<strong>20% Early-Stage:</strong> New projects (under $10M) with strong fundamentals and low market cap.<br>
<strong>10% Ultra-Speculative:</strong> Micro-cap plays with 100x potential.</p>

<h2>Entry Strategy</h2>
<p>Don't buy all at once. Use a 3-tranche system: 50% initial entry, 30% on first dip (-20%), 20% on second dip (-40%). Set limit orders to automate this.</p>

<h2>Exit Strategy</h2>
<p><strong>At 2x:</strong> Sell your initial investment. You're now playing with house money.<br>
<strong>At 5x:</strong> Take 50% profits. Let the rest ride.<br>
<strong>At 10x:</strong> Take another 30%. Keep 20% for moon potential.<br>
<strong>Set stop-losses:</strong> At -30% from entry for each position.</p>

<h2>Research Framework</h2>
<p>Before buying any coin, verify: Locked liquidity (LP locked 6+ months), Active Telegram/Discord (5K+ real members), Audited contract, Transparent team, Real utility or roadmap, Growing holder count.</p>
