<script>
function updateProgress(){const items=document.querySelectorAll('.check-item');const checked=document.querySelectorAll('.check-item:checked');const total=items.length;const done=checked.length;document.getElementById('progressCount').textContent=done;document.getElementById('totalCount').textContent=total;document.getElementById('progressFill').style.width=(total>0?(done/total*100):0)+'%';localStorage.setItem('checklist_dogeking-us',JSON.stringify(Array.from(items).map(i=>i.checked)))}
function resetChecklist(){document.querySelectorAll('.check-item').forEach(c=>{c.checked=false});updateProgress()}
document.addEventListener('DOMContentLoaded',function(){const items=document.querySelectorAll('.check-item');items.forEach(c=>c.addEventListener('change',updateProgress));try{const saved=JSON.parse(localStorage.getItem('checklist_dogeking-us'));if(saved&&saved.length===items.length){items.forEach((c,i)=>c.checked=saved[i])}}catch(e){}updateProgress()})
</script>
