  <h1>🚩 Meme Coin Due Diligence Checklist</h1>
  <div class="subtitle">How to Spot Scams, Rugs, and Honeypots Before You Lose Your SOL</div>

  <p style="margin-bottom:1.5rem;color:#b8a8b8;">The Solana meme coin gold rush has attracted incredible communities &mdash; but also bad actors. In 2024&ndash;2025 alone, over $400M was lost to Solana rug pulls and honeypot scams. Use this checklist <strong>before every meme coin purchase</strong> to protect your portfolio. Score each coin and never buy anything below 7/10.</p>

  <div class="section">
    <h2>🔍 Step 1: Token Contract Analysis</h2>
    <p style="margin-bottom:0.6rem;color:#d0c8d0;">Every legitimate meme coin has its contract verified on Solscan. Never buy a coin you can't verify.</p>
    <ul class="checklist">
      <li class="done"><strong>Contract verified?</strong> Check on Solscan.io or Birdeye. Verified = green checkmark next to contract.</li>
      <li class="done"><strong>Mint authority disabled?</strong> If mint authority is still active, devs can mint infinite tokens. This is the #1 red flag.</li>
      <li class="done"><strong>Freeze authority disabled?</strong> If active, devs can freeze your tokens. Only acceptable for regulated tokens.</li>
      <li class="done"><strong>LP tokens burned or locked?</strong> Check if liquidity pool tokens were burned (sent to dead wallet). If not locked, devs can pull liquidity at any time.</li>
      <li class="done"><strong>Top 10 holders %</strong> &lt; 30%? High concentration = risk of dump. Anything above 50% is a major red flag.</li>
    </ul>
    <div class="flag">
      <strong>🚩 RED FLAG:</strong> Mint authority still active. If the devs can print more tokens, they can dilute your bags into nothing. Most legit projects renounce mint authority within days of launch.
    </div>
  </div>

  <div class="section">
    <h2>👥 Step 2: Team &amp; Community Analysis</h2>
    <ul class="checklist">
      <li class="done"><strong>Team doxxed?</strong> At minimum: anonymous team with consistent track record (previous successful projects).</li>
      <li class="done"><strong>Telegram/Discord members &gt; 5,000 real?</strong> Check member quality &mdash; are accounts posting real messages or just bots?</li>
      <li class="done"><strong>Social channels active for &gt; 30 days?</strong> Rug pulls often have social accounts created days before launch.</li>
      <li class="done"><strong>GitHub activity?</strong> Even meme coins should have some public code or at least a website with a development roadmap.</li>
      <li class="done"><strong>No "Get Rich Quick" promises?</strong> Legitimate communities focus on culture and fun, not guaranteed returns.</li>
    </ul>
    <div class="flag">
      <strong>🚩 RED FLAG:</strong> Devs use a brand-new Twitter account with no history, or the Telegram is "muted" so only admins can speak. Community should be able to ask questions freely.
    </div>
  </div>

  <div class="section">
    <h2>📊 Step 3: Liquidity &amp; Trading Analysis</h2>
    <ul class="checklist">
      <li class="done"><strong>Liquidity &gt; $50,000?</strong> On Solana, anything below $10k LP is extremely risky for slippage and rug pulls.</li>
      <li class="done"><strong>Daily volume &gt; $10k?</strong> Legitimate coins have organic trading volume. Zero volume = dead project.</li>
      <li class="done"><strong>Slippage test &lt; 5%?</strong> Try buying a small amount (0.1 SOL). If slippage is &gt;10%, liquidity is too thin.</li>
      <li class="done"><strong>No buy/sell tax &gt; 10%?</strong> Some tax is normal (2&ndash;5% for marketing). Anything above 10% may be a trap.</li>
      <li class="done"><strong>Can you sell?</strong> Test with a tiny purchase first. Honeypots let you buy but not sell. Always test both directions.</li>
    </ul>
    <div class="flag">
      <strong>🚩 RED FLAG:</strong> You can buy but the transaction reverts when you try to sell. This is a honeypot. Use a tiny test transaction (0.01 SOL) before buying in any size.
    </div>
  </div>

  <div class="section">
    <h2>🌐 Step 4: Website &amp; Branding Analysis</h2>
    <ul class="checklist">
      <li class="done"><strong>Website looks professional?</strong> Does it load properly? Are there broken links or obvious template errors?</li>
      <li class="done"><strong>Roadmap realistic?</strong> Does the project have achievable goals or is it promising "10,000x returns"?</li>
      <li class="done"><strong>Whitepaper or litepaper?</strong> Even a one-page document explaining the project is a good sign.</li>
      <li class="done"><strong>Social links all work?</strong> Twitter, Telegram, Discord, Medium &mdash; check they're all live and active.</li>
      <li class="done"><strong>Brand consistency?</strong> Same logos, color schemes, and messaging across all platforms.</li>
    </ul>
    <div class="green">
      <strong>✅ GREEN FLAG:</strong> The website has been around for more than 3 months, has active blog/content updates, and provides clear tokenomics on a dedicated page.
    </div>
  </div>

  <div class="section">
    <h2>📈 Step 5: On-Chain Metrics (Advanced)</h2>
    <p style="margin-bottom:0.6rem;color:#d0c8d0;">Use Birdeye, DexScreener, or Solscan for these advanced checks:</p>
    <ul class="checklist">
      <li class="done"><strong>Holder growth trend</strong> — Increasing daily? Flat or declining holders is a warning sign.</li>
      <li class="done"><strong>New vs. existing holder ratio</strong> — Healthy projects have a steady stream of new holders, not just existing whales accumulating more.</li>
      <li class="done"><strong>Whale wallet concentration</strong> — Check if any single wallet holds more than 5% of supply. One whale can dump on the whole community.</li>
      <li class="done"><strong>Transaction history patterns</strong> — Look for wash trading (same wallets trading back and forth to fake volume).</li>
      <li class="done"><strong>Age of oldest holders</strong> — Long-term holders who haven't sold are a strong bullish signal.</li>
    </ul>
    <div class="flag">
      <strong>🚩 RED FLAG:</strong> The same 5&ndash;10 wallets account for 80%+ of daily trading volume. This is almost certainly wash trading to create fake activity and lure in buyers.
    </div>
  </div>
