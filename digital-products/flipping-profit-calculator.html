<input type="text" id="itemName" value="Bobcat 7x14 Enclosed Trailer" oninput="calculate()">

<script>
function calculate() {
  var buyPrice = parseFloat(document.getElementById("buyPrice").value) || 0;
  var sellPrice = parseFloat(document.getElementById("sellPrice").value) || 0;
  var platform = document.getElementById("platform").value;
  var shipping = parseFloat(document.getElementById("shipping").value) || 0;
  var repair = parseFloat(document.getElementById("repairCost").value) || 0;
  var feeRate = 0, feeFixed = 0;
  if (platform === "ebay") { feeRate = 0.1325; feeFixed = 0.30; }
  var platformFee = sellPrice * feeRate + feeFixed;
  var totalCost = buyPrice + platformFee + shipping + repair;
  var revenue = sellPrice;
  var netProfit = revenue - totalCost;
  var margin = revenue > 0 ? (netProfit / revenue) * 100 : 0;
  var roi = buyPrice > 0 ? (netProfit / buyPrice) * 100 : 0;
  function fmt(v) { var parts = v.toFixed(2).split("."); parts[0] = parts[0].replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1,"); return "$" + parts.join("."); }
  function pct(v) { return v.toFixed(1) + "%"; }
  document.getElementById("revenue").textContent = fmt(revenue);
  document.getElementById("fees").textContent = fmt(platformFee);
  document.getElementById("totalCosts").textContent = fmt(totalCost);
  var pe = document.getElementById("netProfit");
  pe.textContent = fmt(netProfit);
  pe.className = "value " + (netProfit > 0 ? "profit" : netProfit < 0 ? "loss" : "break");
  var me = document.getElementById("profitMargin");
  me.textContent = pct(margin);
  me.className = "value " + (margin > 0 ? "profit" : margin < 0 ? "loss" : "break");
  var re = document.getElementById("roi");
  re.textContent = pct(roi);
  re.className = "value " + (roi > 0 ? "profit" : roi < 0 ? "loss" : "break");
}
calculate();
</script>
