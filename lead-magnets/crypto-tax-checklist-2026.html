  <h1>📋 Crypto Tax Checklist 2026</h1>
  <div class="subtitle">Everything You Need to Track This Tax Season &mdash; Don&rsquo;t Get Audited</div>

  <p style="margin-bottom:1.5rem;color:#a5aac0;">The IRS and global tax authorities have been aggressively tightening crypto tax enforcement. In 2026, new <strong>Broker Reporting Rules</strong> (from the Infrastructure Act) are fully in effect, meaning exchanges and DeFi front-ends are reporting your trades to tax agencies. Here&rsquo;s exactly what you need to track, gather, and file.</p>

  <div class="section">
    <h2>📌 Transaction Types You Must Report</h2>
    <div class="table-wrap">
      <table>
        <tr><th>Transaction Type</th><th>Taxable Event?</th><th>What to Record</th></tr>
        <tr><td>Selling Crypto for Fiat (USD/EUR)</td><td>✅ Yes</td><td>Sale price, cost basis, date, gain/loss</td></tr>
        <tr><td>Crypto-to-Crypto Swap</td><td>✅ Yes</td><td>Fair market value at time of swap (USD)</td></tr>
        <tr><td>Buying Crypto with Fiat</td><td>❌ No</td><td>Cost basis for future sale</td></tr>
        <tr><td>Receiving Airdrop</td><td>✅ Yes (Income)</td><td>FMV at time of receipt</td></tr>
        <tr><td>Staking Rewards</td><td>✅ Yes (Income)</td><td>FMV when received</td></tr>
        <tr><td>Mining Rewards</td><td>✅ Yes (Income)</td><td>FMV when received</td></tr>
        <tr><td>NFT Sale</td><td>✅ Yes</td><td>Sale price, cost basis, creator royalties</td></tr>
        <tr><td>Gifting Crypto (over $17k)</td><td>⚠️ Gift Tax</td><td>FMV and recipient info</td></tr>
        <tr><td>Donating Crypto</td><td>❌ No (Deduction)</td><td>FMV at donation date, charity receipt</td></tr>
        <tr><td>Transfer Between Your Wallets</td><td>❌ No</td><td>Just record for cost-basis tracking</td></tr>
      </table>
    </div>
  </div>

  <div class="section">
    <h2>🗂️ Documents to Gather</h2>
    <ul class="checklist">
      <li class="done">CSV transaction exports from all CEXs (Coinbase, Binance, Kraken, Bybit, etc.)</li>
      <li class="done">Wallet transaction history from all DeFi wallets (Phantom, MetaMask, Solflare, Backpack)</li>
      <li class="done">Staking reward reports (Solana validators, liquid staking protocols)</li>
      <li class="done">Airdrop receipts (dates, FMV at receipt, screenshots of announcements)</li>
      <li class="done">NFT purchase and sale records (mint price, sale proceeds, royalties paid)</li>
      <li class="done">DeFi interaction logs (lending, borrowing, LP deposits/withdrawals)</li>
      <li class="done">Previous year's carry-forward loss records (if applicable)</li>
      <li class="done">Form W-9 or equivalent if you did large-volume trading on US exchanges</li>
    </ul>
  </div>

  <div class="section">
    <h2>🧮 Cost Basis Methods (Choose One)</h2>
    <p style="margin-bottom:0.8rem;color:#c5c8e0;">Your cost basis method dramatically affects your tax bill. The IRS requires you to use a consistent method for all crypto:</p>
    <div class="table-wrap">
      <table>
        <tr><th>Method</th><th>How It Works</th><th>Best For</th></tr>
        <tr><td><strong>FIFO</strong> (First In, First Out)</td><td>Oldest coins sold first</td><td>Simple, lower short-term gains</td></tr>
        <tr><td><strong>LIFO</strong> (Last In, First Out)</td><td>Newest coins sold first</td><td>Higher cost basis = lower gains</td></tr>
        <tr><td><strong>HIFO</strong> (Highest In First Out)</td><td>Highest-cost-basis coins sold first</td><td>Aggressively minimize gains</td></tr>
        <tr><td><strong>Specific ID</strong></td><td>Pick exact lots to sell</td><td>Maximum flexibility</td></tr>
      </table>
    </div>
    <div class="tip">
      <strong>💡 Pro Tip:</strong> HIFO or Specific ID usually produces the lowest tax bill. But you must keep immaculate records to use Specific ID &mdash; tracking each purchase lot separately.
    </div>
  </div>

  <div class="section">
    <h2>📅 Key Dates for 2026 Tax Season</h2>
    <ul class="checklist">
      <li><strong>January 1, 2026:</strong> Start tracking all 2026 transactions from day one</li>
      <li><strong>January 31, 2026:</strong> Deadline for exchanges to issue 1099 forms (US)</li>
      <li><strong>March 15, 2026:</strong> Estimated tax payment due for Q1 (if you owe over $1k)</li>
      <li><strong>April 15, 2026:</strong> Federal tax filing deadline (Extension available to Oct 15)</li>
      <li><strong>June 15, 2026:</strong> Estimated tax payment due for Q2</li>
      <li><strong>September 15, 2026:</strong> Estimated tax payment due for Q3</li>
      <li><strong>January 15, 2027:</strong> Estimated tax payment due for Q4 (2026)</li>
      <li><strong>October 15, 2027:</strong> Extended filing deadline (if you filed for extension)</li>
    </ul>
  </div>

  <div class="section">
    <h2>🤖 Best Tax Software for 2026</h2>
    <ul class="checklist">
      <li class="done"><strong>CoinTracker</strong> — Best for Solana/Phantom wallet integration, supports 500+ exchanges</li>
      <li class="done"><strong>Koinly</strong> — Great for DeFi-heavy portfolios with complex transaction chains</li>
      <li class="done"><strong>TaxBit</strong> — Enterprise-grade, used by Coinbase and many large exchanges</li>
      <li class="done"><strong>ZenLedger</strong> — Good balance of price and features, supports NFT tracking</li>
      <li class="done"><strong>TokenTax</strong> — Premium option with dedicated CPA support</li>
    </ul>
    <div class="tip">
      <strong>💡 Pro Tip:</strong> If you traded meme coins heavily on Solana (hundreds of small swaps), use a tool that handles Solana's compressed NFT and token-2022 standards properly. Koinly and CoinTracker lead in Solana support as of 2026.
    </div>
  </div>

  <div class="section">
    <h2>⚠️ Common Tax Mistakes to Avoid</h2>
    <ul class="checklist">
      <li>❌ <strong>Forgetting staking rewards</strong> — Every SOL staking reward is taxable income at receipt</li>
      <li>❌ <strong>Ignoring tiny trades</strong> — The IRS sees everything now with Broker Rules (DeFi front-end reporting)</li>
      <li>❌ <strong>Not tracking cost basis by lot</strong> — Without lot tracking, FIFO is assumed (usually worse for you)</li>
      <li>❌ <strong>Mixing business and personal</strong> — If you trade as a business, different rules apply (Section 475 mark-to-market)</li>
      <li>❌ <strong>Forgetting state taxes</strong> — Some states (NY, CA, HI) have extra crypto tax requirements</li>
    </ul>
  </div>

  <div class="section">
    <h2>🎯 Meme Coin Tax Special Note</h2>
    <p style="color:#c5c8e0;">For meme coin traders on Solana specifically: every swap on Jupiter, Raydium, or Orca is a taxable event. If you day-trade meme coins with 50+ transactions a day, you must use automated tax software &mdash; manual tracking is impossible. Dogeking.us recommends exporting your Phantom wallet history monthly to avoid a year-end scramble.</p>
  </div>
