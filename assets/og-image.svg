<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-dk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78350f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg-dk2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.3);stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow-dk" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-dk)" rx="0"/>
  <rect width="1200" height="630" fill="url(#glow-dk)"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg-dk2)" opacity="0.3"/>
  
  <!-- Crown decoration -->
  <text x="600" y="240" font-family="Arial,sans-serif" font-size="100" text-anchor="middle" opacity="0.12">&#x1F451;</text>
  
  <!-- Crown icon -->
  <text x="600" y="300" font-family="Arial,sans-serif" font-size="72" text-anchor="middle">&#x1F451;</text>
  
  <!-- Site name -->
  <text x="600" y="390" font-family="Georgia,'Times New Roman',serif" font-size="56" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">DogeKing</text>
  
  <!-- Tagline -->
  <text x="600" y="440" font-family="Arial,sans-serif" font-size="22" fill="#fef3c7" text-anchor="middle" letter-spacing="1">The Meme Coin Royalty on Solana</text>
  
  <!-- Divider -->
  <line x1="500" y1="460" x2="700" y2="460" stroke="#fbbf24" stroke-width="2" opacity="0.5"/>
  
  <!-- URL -->
  <text x="600" y="510" font-family="Arial,sans-serif" font-size="16" fill="#fde68a" text-anchor="middle" letter-spacing="3" opacity="0.7">DOGEKING.US</text>
  
  <!-- Bottom accent -->
  <rect x="0" y="620" width="1200" height="10" fill="#fbbf24" opacity="0.3"/>
</svg>