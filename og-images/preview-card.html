    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 40%, #0d0d2b 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        /* Background decorative elements */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.08;
        }
        .bg-circle-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #FFD700, transparent);
            top: -150px; right: -100px;
        }
        .bg-circle-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #F0B90B, transparent);
            bottom: -100px; left: -80px;
        }
        .bg-circle-3 {
            width: 200px; height: 200px;
            background: radial-gradient(circle, #B8860B, transparent);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Grid pattern */
        .grid-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Crown decoration */
        .crown {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 64px;
            opacity: 0.15;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.3));
        }

        /* Content card */
        .card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 1050px;
            padding: 48px 56px;
            background: rgba(15, 15, 40, 0.85);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 80px rgba(0,0,0,0.6);
        }

        /* Category badge */
        .category {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(255,215,0,0.1);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
        }

        /* Title */
        .title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 52px;
            font-weight: 700;
            color: #FFFFFF;
            line-height: 1.2;
            margin-bottom: 16px;
            max-height: 200px;
            overflow: hidden;
        }
        .title .highlight {
            color: #FFD700;
        }

        /* Description */
        .description {
            font-size: 20px;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
            margin-bottom: 24px;
            max-height: 64px;
            overflow: hidden;
        }

        /* Bottom bar */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 20px;
            border-top: 1px solid rgba(255,215,0,0.15);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-icon {
            font-size: 32px;
        }
        .brand-text {
            font-size: 22px;
            font-weight: 700;
            color: #FFD700;
        }
        .brand-text span {
            color: #FFFFFF;
            font-weight: 400;
        }
        .site-url {
            font-size: 16px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.5px;
        }

        /* Gradient accent line */
        .accent-line {
            position: absolute;
            bottom: 0;
            left: 56px;
            right: 56px;
            height: 3px;
            background: linear-gradient(90deg, #FFD700, #B8860B, #FFD700);
            border-radius: 2px;
            opacity: 0.6;
        }

        /* Fallback text */
        .no-param {
            color: rgba(255,255,255,0.4);
            font-size: 18px;
            text-align: center;
            padding: 40px;
        }
