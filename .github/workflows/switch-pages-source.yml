name: Switch Pages to gh-pages branch

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  switch:
    runs-on: ubuntu-latest
    steps:
      - name: Switch Pages source to gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Updating Pages source to gh-pages branch ==="
          STATUS=$(curl -s -o /tmp/pages-response.json -w "%{http_code}" -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"},"build_type":"workflow"}')
          echo "HTTP Status: $STATUS"
          cat /tmp/pages-response.json
          echo ""
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ] || [ "$STATUS" = "204" ]; then
            echo "✓ Pages source switched to gh-pages!"
          else
            echo "✗ Failed - Commander needs to manually set Pages source to gh-pages branch in repo Settings > Pages"
          fi
