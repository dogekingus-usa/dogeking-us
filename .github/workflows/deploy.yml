name: Deploy to gh-pages branch (bypasses Jekyll)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: '.'
          enable_jekyll: false
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com

      - name: Ensure Pages source is set to gh-pages branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "=== Checking current Pages config ==="
          curl -s -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pages > /tmp/current-pages.json
          cat /tmp/current-pages.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Branch: {d.get(\"source\",{}).get(\"branch\",\"unknown\")}')" 2>/dev/null || echo "Could not parse Pages config"
          
          echo ""
          echo "=== Setting Pages source to gh-pages branch ==="
          STATUS=$(curl -s -o /tmp/pages-result.json -w "%{http_code}" -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"},"build_type":"workflow"}')
          echo "HTTP Status: $STATUS"
          cat /tmp/pages-result.json
          echo ""
          
          if [ "$STATUS" = "204" ] || [ "$STATUS" = "200" ] || [ "$STATUS" = "201" ]; then
            echo "✓ Successfully switched Pages source to gh-pages!"
          else
            echo "⚠️ Could not auto-switch. Pages API returned $STATUS"
            echo "Manual fix: Settings > Pages > Branch > gh-pages > Save"
          fi
